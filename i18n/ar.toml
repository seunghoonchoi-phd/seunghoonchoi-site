other = "باحث في المواد الحاسوبية وطالب دكتوراه في جامعة فلوريدا (UF). عملت في مصانع البطاريات وفي أبحاث المواد، وأركّز الآن على تجربة وتوثيق كيف يمكن للفرد أن ينجح في عصر الذكاء الاصطناعي. أؤمن بالبنية أكثر من السلطة، وبالنماذج أكثر من الحدس، وبالأنظمة أكثر من بذل الجهد وحده."


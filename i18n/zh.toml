[author_bio]
other = "计算材料科学家，佛罗里达大学（UF）博士研究生。在 Advanced Functional Materials、Biomimetics 担任第一/共同第一作者，持有一项纤维传感器注册专利，曾获 2018 年 MRS 秋季会议最佳海报奖。他亲历过动力电池制造现场、材料研究与赴美求学，把踩过的坑用工程师的方式梳理出来，让后来的人少走些弯路。"

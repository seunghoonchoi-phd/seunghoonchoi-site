name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Run layout harness
        run: node tools/check-rtl-layout.cjs
      - name: Check language sync
        run: node tools/check-language-sync.js
      - name: Check language shape
        run: node tools/check-language-shape.js
      - name: Check Language Recall public safety
        run: node tools/check-language-recall-public.js
      - name: Check caption quality
        run: node tools/check-caption-quality.js
      - name: Check paragraph rhythm
        run: node tools/check-paragraph-rhythm.js
      - name: Check Korean literal style
        run: node tools/check-korean-literal-style.js
      - name: Audit source text
        run: node tools/audit-site-text.js --source-only --fail-on-hard
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          TZ: America/New_York
        run: hugo --gc --minify
      - name: Audit rendered text
        run: node tools/audit-site-text.js --fail-on-hard --output text-audit
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

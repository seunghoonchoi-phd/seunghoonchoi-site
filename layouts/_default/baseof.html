<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}"{{ with .Site.Language.Direction }} dir="{{ . }}"{{ end }}>
<head>
  {{ partial "head.html" . }}
</head>
<body class="lang-{{ .Site.Language.Lang }}">
  <a class="skip" href="#main">{{ i18n "skip_to_content" }}</a>
  {{ partial "header.html" . }}
  <main id="main" class="main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>window.SC={author:{{ i18n "author_name" }},srcLabel:{{ i18n "copy_source" }},title:{{ .Title }},url:{{ .Permalink }}};</script>
  {{ $js := resources.Get "js/main.js" | resources.Minify | resources.Fingerprint }}
  <script src="{{ $js.RelPermalink }}" defer></script>
  {{ partial "inline-edit.html" . }}
</body>
</html>

<article class="card reveal" data-cat="{{ range .Params.categories }}{{ . | urlize }} {{ end }}">
  <div class="card__meta">
    {{ with .Date }}{{ if not .IsZero }}<time datetime="{{ .Format "2006-01-02" }}">{{ .Format "2006.01.02" }}</time>{{ end }}{{ end }}
    {{ with .Params.categories }}<span class="card__cat">{{ index . 0 }}</span>{{ end }}
  </div>
  <h3 class="card__title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  {{ with .Params.subtitle }}<p class="card__excerpt">{{ . }}</p>{{ else }}<p class="card__excerpt">{{ .Summary | plainify | truncate 130 }}</p>{{ end }}
  <a class="link" href="{{ .RelPermalink }}">{{ i18n "read_more" }} →</a>
</article>

<footer class="foot">
  <div class="foot__inner">
    <div class="foot__brand">
      <span class="foot__name">{{ .Site.Title }}</span>
      <span class="foot__role">{{ .Site.Params.role }}</span>
    </div>
    <div class="foot__links">
      <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
      <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener">LinkedIn ↗</a>
      <a href="{{ "youtube/" | relLangURL }}">{{ i18n "youtube" }}</a>
    </div>
    <div class="foot__legal"><a href="{{ "admin/" | relURL }}" title="{{ i18n "admin_panel" }}">© {{ now.Year }} {{ .Site.Title }}. {{ i18n "footer_rights" }}</a></div>
  </div>
</footer>

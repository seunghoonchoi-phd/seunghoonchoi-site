<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FCFBF9" />
  <meta name="description" content="영어·중국어 읽기 속도·이해 훈련 앱. 속독 미신 없이, 근거가 검증된 방법만 — 레벨별 지문, 어휘 자동화, 이해도 게이트(ERR), 반복읽기 전이, 논문 3-패스." />
  <title>리드패스트 — 읽기 속도·이해 훈련</title>
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://seunghoonchoi.com/reading-trainer/" />
  <meta property="og:title" content="리드패스트 — 영어·중국어 읽기 속도·이해 훈련" />
  <meta property="og:description" content="속독 미신을 걷어내고 전이가 검증된 기법만: 레벨별 지문·어휘 자동화·이해 게이트(ERR)·반복읽기 전이·논문 3-패스. 무료 설치형 웹앱." />
  <meta property="og:image" content="https://seunghoonchoi.com/reading-trainer/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="리드패스트 — 영어·중국어 읽기 속도·이해 훈련" />
  <meta name="twitter:description" content="속독 미신 없이, 전이가 검증된 기법만 구현한 영·중 읽기 훈련 PWA. 입문부터 최상급·과부하까지." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#view">본문으로 건너뛰기</a>

  <header class="appbar">
    <div class="appbar__brand" role="button" tabindex="0" title="홈으로" aria-label="홈으로">
      <span class="appbar__logo" aria-hidden="true"></span>
      <span class="appbar__title">리드패스트</span>
      <span class="appbar__sub">읽기 속도·이해 훈련</span>
    </div>
    <nav class="tabbar" aria-label="주 메뉴">
      <button class="tab is-active" data-route="home" type="button"><span class="tab__ico"></span><span class="tab__lbl">오늘</span></button>
      <button class="tab" data-route="train" type="button"><span class="tab__ico"></span><span class="tab__lbl">훈련</span></button>
      <button class="tab" data-route="mytexts" type="button"><span class="tab__ico"></span><span class="tab__lbl">내 글</span></button>
      <button class="tab" data-route="progress" type="button"><span class="tab__ico"></span><span class="tab__lbl">기록</span></button>
      <button class="tab" data-route="theory" type="button"><span class="tab__ico"></span><span class="tab__lbl">원리</span></button>
    </nav>
    <div class="appbar__controls">
      <div class="seg" role="group" aria-label="훈련 대상 언어">
        <button class="seg__btn is-active" data-lang="en" type="button" aria-pressed="true">English</button>
        <button class="seg__btn" data-lang="zh" type="button" aria-pressed="false">中文</button>
      </div>
      <button id="themeToggle" class="iconbtn" type="button" aria-label="밝게/어둡게 전환" title="테마 전환">◐</button>
      <button id="settingsBtn" class="iconbtn" type="button" aria-label="설정" title="설정 (레벨·데이터)"></button>
    </div>
  </header>

  <main id="view" tabindex="-1" class="view"></main>

  <script type="module" src="js/app.js"></script>
  <!-- GoatCounter analytics (앱 repo가 원본 — 미러 수기 편집 금지, robocopy /MIR가 지우기 때문) -->
  <script data-goatcounter="https://seunghoonchoi.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>

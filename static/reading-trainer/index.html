<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FCFBF9" />
  <meta name="description" content="영어와 중국어 읽기 훈련 앱. 속도와 이해를 따로 기록하고, 처음 보는 글에서도 이해가 유지되는지 확인합니다." />
  <title>리드패스트 | 읽기 속도와 이해 훈련</title>
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://seunghoonchoi.com/reading-trainer/" />
  <meta property="og:title" content="리드패스트 | 영어와 중국어 읽기 훈련" />
  <meta property="og:description" content="읽은 속도와 이해 결과를 나란히 보고, 처음 보는 글에서 실제 변화를 확인하는 무료 설치형 웹앱." />
  <meta property="og:image" content="https://seunghoonchoi.com/reading-trainer/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="리드패스트 | 영어와 중국어 읽기 훈련" />
  <meta name="twitter:description" content="속도와 이해를 따로 기록하고, 처음 보는 글에서도 이해가 유지되는지 확인하는 읽기 훈련 PWA." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#view" data-i18n="shell.skip">본문으로 건너뛰기</a>

  <header class="appbar">
    <button class="appbar__brand" type="button" title="훈련으로" aria-label="훈련으로">
      <span class="appbar__logo" aria-hidden="true"></span>
      <span class="appbar__title" data-i18n="shell.brand">리드패스트</span>
      <span class="appbar__sub" data-i18n="shell.tagline">읽기 속도와 이해 훈련</span>
    </button>
    <nav class="tabbar" aria-label="주 메뉴" data-i18n-aria-label="shell.nav">
      <button class="tab is-active" data-route="train" type="button" aria-current="page"><span class="tab__ico" aria-hidden="true"></span><span class="tab__lbl" data-i18n="shell.nav.train">훈련</span></button>
      <button class="tab" data-route="mytexts" type="button"><span class="tab__ico" aria-hidden="true"></span><span class="tab__lbl" data-i18n="shell.nav.myTexts">내 글</span></button>
      <button class="tab" data-route="progress" type="button"><span class="tab__ico" aria-hidden="true"></span><span class="tab__lbl" data-i18n="shell.nav.progress">기록</span></button>
      <button class="tab" data-route="theory" type="button"><span class="tab__ico" aria-hidden="true"></span><span class="tab__lbl" data-i18n="shell.nav.theory">원리</span></button>
    </nav>
    <div class="appbar__controls">
      <div class="seg" role="group" aria-label="훈련할 언어" data-i18n-aria-label="shell.trainingLanguage">
        <button class="seg__btn is-active" data-lang="en" type="button" aria-pressed="true" aria-label="English"><span class="seg__label-full">English</span><span class="seg__label-short" aria-hidden="true">EN</span></button>
        <button class="seg__btn" data-lang="zh" type="button" aria-pressed="false" aria-label="中文"><span class="seg__label-full">中文</span><span class="seg__label-short" aria-hidden="true">中文</span></button>
      </div>
      <button id="uiLangToggle" class="iconbtn iconbtn--lang" type="button" data-ui-lang-toggle aria-label="화면을 영어로 바꾸기">EN</button>
      <button id="themeToggle" class="iconbtn" type="button" aria-label="화면 밝기 전환" title="밝은 화면과 어두운 화면 전환" data-i18n-aria-label="shell.theme" data-i18n-title="shell.themeTitle"></button>
      <button id="settingsBtn" class="iconbtn" type="button" aria-label="설정" title="읽기 화면과 데이터 설정" data-i18n-aria-label="shell.settings" data-i18n-title="shell.settingsTitle"></button>
    </div>
  </header>

  <main id="view" tabindex="-1" class="view"></main>

  <script type="module">
    import { bindI18nUI, initI18n } from './js/i18n.js';
    initI18n();
    bindI18nUI();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>

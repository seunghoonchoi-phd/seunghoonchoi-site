<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">US Tax Navigator</title>
  <desc id="desc">A copper six-step path leads to cream tax forms labeled 1040-NR and 8843 on a navy field.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091632"/>
      <stop offset="0.58" stop-color="#0D1B4C"/>
      <stop offset="1" stop-color="#16295C"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E7B07D" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#E7B07D" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020817" flood-opacity="0.46"/>
    </filter>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#D8D4C8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="42" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="42" fill="url(#grid)"/>
  <circle cx="720" cy="330" r="260" fill="url(#glow)"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M110 500C170 430 220 420 260 470S350 470 390 400S470 380 520 410S580 380 620 345"
          stroke="#C78658" stroke-opacity="0.82" stroke-width="6"/>
    <path d="M150 560C260 570 340 540 420 500" stroke="#E9E2D3" stroke-opacity="0.4" stroke-width="4" stroke-dasharray="4 15"/>
    <path d="M240 160C330 180 400 230 450 290" stroke="#E9E2D3" stroke-opacity="0.4" stroke-width="4" stroke-dasharray="4 15"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="215" width="230" height="310" rx="22" fill="#F2EEE5" opacity="0.88"
          transform="rotate(-8 675 370)"/>
  </g>
  <g transform="rotate(-8 675 370)">
    <text x="592" y="279" fill="#0D1B4C" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif"
          font-size="38" font-weight="700">8843</text>
    <path d="M592 316h150M592 352h108M592 388h150" fill="none" stroke="#0D1B4C" stroke-width="10"
          stroke-linecap="round" stroke-opacity="0.8"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="150" width="300" height="390" rx="24" fill="#F2EEE5"/>
  </g>
  <text x="694" y="235" fill="#0D1B4C" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif"
        font-size="48" font-weight="700">1040-NR</text>
  <g fill="none" stroke="#0D1B4C" stroke-width="12" stroke-linecap="round">
    <path d="M694 292h212M694 336h164M694 380h212M694 424h136"/>
  </g>
  <g fill="#C78658">
    <circle cx="906" cy="336" r="11"/>
    <circle cx="866" cy="424" r="11"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="932" cy="512" r="62" fill="#C78658"/>
  </g>
  <path d="m904 512 22 22 38-44" fill="none" stroke="#F2EEE5" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>

  <g fill="#E4A470" stroke="#F2EEE5" stroke-width="7">
    <circle cx="110" cy="500" r="19"/>
    <circle cx="260" cy="470" r="15"/>
    <circle cx="390" cy="400" r="19"/>
    <circle cx="520" cy="410" r="15"/>
    <circle cx="620" cy="345" r="19"/>
  </g>
  <g fill="#F2EEE5">
    <circle cx="190" cy="437" r="10"/>
  </g>
</svg>

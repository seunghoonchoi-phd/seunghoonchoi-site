    <path d="M603 334C685 334 750 395 821 444S951 501 1060 454" stroke="#C78658" stroke-opacity="0.82" stroke-width="6"/>
    <path d="M337 124C410 151 453 205 475 267" stroke="#C78658" stroke-opacity="0.38" stroke-width="3" stroke-dasharray="4 15"/>

baseURL = "https://seunghoonchoi.com/"
title = "Seunghoon Choi"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableEmoji = true
buildFuture = true   # publish same-day/future-dated posts (avoid timezone-boundary skips)

[pagination]
  pagerSize = 8

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    style = "github"

[outputFormats]
  # llms.txt / llms-full.txt — curated map + full text for LLMs and AI search engines (spec: llmstxt.org)
  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    rel = "alternate"
    permalinkable = false
  [outputFormats.LLMSFULL]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    rel = "alternate"
    permalinkable = false

[outputs]
  home = ["HTML", "RSS", "LLMS", "LLMSFULL"]
  section = ["HTML", "RSS"]

[params]
  author = "Seunghoon Choi"
  email = "schoi2@ufl.edu"
  emailPersonal = "herring2141@gmail.com"
  linkedin = "https://www.linkedin.com/in/seunghoon-choi-18218a178"
  # Fill these once the accounts exist — they auto-link into the Person schema (sameAs).
  orcid = "https://orcid.org/0009-0007-8324-2943"
  googleScholar = "https://scholar.google.com/citations?user=TRtHbDwAAAAJ"
  github = "https://github.com/seunghoonchoi-phd"
  instagram = "https://www.instagram.com/hoonchoi.mk1/"
  twitter = "https://x.com/herring2141"
  threads = "https://www.threads.com/@hoonchoi.mk1"

[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 60
  [[related.indices]]
    name = "date"
    weight = 10


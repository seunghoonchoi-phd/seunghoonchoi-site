baseURL = "https://seunghoonchoi.com/"
title = "Seunghoon Choi"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableEmoji = true

[pagination]
  pagerSize = 8

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    style = "github"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[params]
  author = "Seunghoon Choi"
  email = "schoi2@ufl.edu"
  emailPersonal = "herring2141@gmail.com"
  linkedin = "https://www.linkedin.com/in/seunghoon-choi-18218a178"

[languages]
  [languages.en]
    label = "English"
    locale = "en-US"
    contentDir = "content/en"
    weight = 1
    title = "Seunghoon Choi"
    [languages.en.params]
      role = "Computational Materials Scientist"
      tagline = "Bridging materials, manufacturing, and data-driven methods."
      description = "Seunghoon Choi — Computational Materials Scientist at the University of Florida. Research, writing, and guides."
  [languages.ko]
    label = "한국어"
    locale = "ko-KR"
    contentDir = "content/ko"
    weight = 2
    title = "Seunghoon Choi"
    [languages.ko.params]
      role = "Computational Materials Scientist · 작가"
      tagline = "재료를 계산으로 연구하고, 그 너머의 이야기를 씁니다."
      description = "최승훈(Seunghoon Choi) — 계산재료과학자이자 작가. 연구, 글, 가이드를 한곳에."

# Section navigation (shared structure; labels via i18n)
[[menus.main]]

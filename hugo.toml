baseURL = "https://seunghoonchoi.com/"
title = "Seunghoon Choi"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableEmoji = true
buildFuture = true   # publish same-day/future-dated posts (avoid timezone-boundary skips)

[pagination]
  pagerSize = 8

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    style = "github"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[params]
  author = "Seunghoon Choi"
  email = "schoi2@ufl.edu"
  emailPersonal = "herring2141@gmail.com"
  linkedin = "https://www.linkedin.com/in/seunghoon-choi-18218a178"
  # Fill these once the accounts exist — they auto-link into the Person schema (sameAs).
  orcid = "https://orcid.org/0009-0007-8324-2943"
  googleScholar = "https://scholar.google.com/citations?user=TRtHbDwAAAAJ"

[languages]
  [languages.en]
    label = "English"
    locale = "en-US"
    contentDir = "content/en"
    weight = 1
    title = "Seunghoon Choi"
    [languages.en.params]
      role = "Computational Materials Scientist"
      tagline = "I research materials through computation, and write the stories beyond the lab."
      description = "Seunghoon Choi — Computational Materials Scientist at the University of Florida. Research, writing, and guides."
  [languages.ko]
    label = "한국어"
    locale = "ko-KR"
    contentDir = "content/ko"
    weight = 2
    title = "Seunghoon Choi"
    [languages.ko.params]
      role = "Computational Materials Scientist · 작가"
      tagline = "재료는 계산으로 연구하고, 그 바깥의 이야기는 글로 씁니다."
      description = "최승훈(Seunghoon Choi) — 계산재료과학자이자 작가. 연구, 글, 가이드를 한곳에."

# Primary navigation is defined in layouts/partials/header.html with hover
# dropdowns (홈 · 연구 · 글▾[칼럼·책·문학집] · 유튜브 · 자료▾[앱·커리어가이드] · 소개).
# Labels come from i18n/{en,ko}.toml keyed by section identifier.
# Content sections: research, column, books, literature, youtube, apps, career
# plus the single page about.md.

  name = "Research"
  pageRef = "/research"
  weight = 10
[[menus.main]]
  identifier = "writing"
  name = "Writing"
  pageRef = "/writing"
  weight = 20
[[menus.main]]
  identifier = "guides"
  name = "Guides"
  pageRef = "/guides"
  weight = 30
[[menus.main]]
  identifier = "about"
  name = "About"
  pageRef = "/about"
  weight = 40
